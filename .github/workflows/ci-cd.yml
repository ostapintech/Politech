name: Python CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # або твоя версія
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest flake8 black

      - name: Run linter (Quality Gate)
        run: |
          # Перевірка стилю коду
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          black --check .

      - name: Run unit and E2E tests
        run: |
            # 1. Start FastAPI in the background and redirect logs to a file
            python -m uvicorn main:app --host 127.0.0.1 --port 8000 > server.log 2>&1 &
            
            # 2. Wait for the server to be ready (up to 30 seconds)
            timeout 30s bash -c 'until curl -s localhost:8000/ > /dev/null; do sleep 1; done' || (cat server.log && exit 1)
            
            # 3. Run tests
            pytest