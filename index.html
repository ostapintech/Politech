    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        .card { border: 1px solid #ccc; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 300px; }
        input, button { width: 100%; margin-top: 10px; padding: 8px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; border: none; cursor: pointer; }
        #urgent-btn { background-color: #dc3545; display: none; } /* Прихована кнопка для Кроку 5 [cite: 834] */
    </style>
</head>
<body>

    <div class="card">
        <h2>UniDone v2</h2>
        <p>Тестування запису сесій та Feature Flags</p>

        <input type="text" id="taskInput" placeholder="Назва завдання...">
        <button onclick="sendTask()">Аналізувати завдання</button>

        <button id="urgent-btn">ТЕРМІНОВО (Flag Active)</button>
    </div>

    <script>
        // Крок 5: Керування інтерфейсом через Feature Flag [cite: 832, 833]
        posthog.onFeatureFlags(function() {
            if (posthog.isFeatureEnabled('show-urgent-filter')) {
                document.getElementById('urgent-btn').style.display = 'block';
            }
        });

        // Функція для імітації створення завдання та кастомної події
        async function sendTask() {
            const desc = document.getElementById('taskInput').value;

            // Відправляємо подію в PostHog (Клієнтська сторона) [cite: 412]
            posthog.capture('task_analyzed_client', {
                task_length: desc.length
            });

            alert('Подія відправлена! Перевір Session Replay у PostHog.');
        }
    </script>

</body>
</html>
